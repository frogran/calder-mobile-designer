<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image → SVG Vectorizer — Calder Tools</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap');

  :root {
    --bg: #0e0e11;
    --surface: #16161b;
    --surface2: #1e1e25;
    --border: #2a2a35;
    --text: #e8e6e1;
    --text-dim: #8a8892;
    --accent: #f05e23;
    --accent2: #ff8c5a;
    --accent-glow: rgba(240, 94, 35, 0.15);
    --success: #4ecb71;
    --canvas-bg: #121215;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.5px;
    color: var(--text);
  }
  header h1 span { color: var(--accent); }

  .status-pill {
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
  }
  .status-pill.active { color: var(--success); border-color: var(--success); }

  .main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Canvas area */
  .canvas-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--canvas-bg);
    position: relative;
  }

  .canvas-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
  }

  .canvas-toolbar .view-toggle {
    margin-left: auto;
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .canvas-toolbar .view-toggle button {
    padding: 4px 12px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .canvas-toolbar .view-toggle button.active {
    background: var(--accent);
    color: #fff;
  }
  .canvas-toolbar .view-toggle button:not(:last-child) {
    border-right: 1px solid var(--border);
  }

  .canvas-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    max-width: 100%;
    max-height: 100%;
    display: block;
    image-rendering: pixelated;
  }

  #traceCanvas {
    position: absolute;
    pointer-events: none;
  }

  .drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .drop-zone:hover, .drop-zone.dragover {
    background: var(--accent-glow);
  }

  .drop-zone svg {
    width: 64px;
    height: 64px;
    stroke: var(--text-dim);
    fill: none;
    stroke-width: 1.5;
    transition: stroke 0.2s;
  }
  .drop-zone:hover svg, .drop-zone.dragover svg {
    stroke: var(--accent);
  }

  .drop-zone p {
    font-size: 13px;
    color: var(--text-dim);
  }
  .drop-zone p span {
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
  }

  .drop-zone.hidden { display: none; }

  /* Panel */
  .panel {
    width: 340px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  .panel-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .panel-section h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .control-row label {
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
    width: 110px;
  }

  .control-row input[type="range"] {
    flex: 1;
    margin: 0 10px;
    accent-color: var(--accent);
    height: 4px;
  }

  .control-row .val {
    font-size: 11px;
    color: var(--text);
    width: 40px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .control-row select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    cursor: pointer;
  }

  .checkbox-row input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
  }

  .checkbox-row label {
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
  }

  .info-box {
    background: var(--accent-glow);
    border: 1px solid rgba(240,94,35,0.2);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--accent2);
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    text-align: center;
  }

  .stat-card .stat-val {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 300;
    color: var(--accent);
  }

  .stat-card .stat-label {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* Buttons */
  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    background: var(--surface2);
    color: var(--text);
    transition: all 0.15s;
    width: 100%;
  }
  .btn:hover { background: var(--border); }
  .btn:disabled { opacity: 0.4; cursor: default; }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }

  .panel-footer {
    padding: 16px 20px;
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Preview SVG overlay */
  .svg-preview-overlay {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }

  /* Scrollbar */
  .panel::-webkit-scrollbar { width: 6px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .processing-overlay {
    position: absolute;
    inset: 0;
    background: rgba(14, 14, 17, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--accent);
    z-index: 10;
  }
  .processing-overlay.hidden { display: none; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>Image → <span>SVG</span> Vectorizer</h1>
  <span class="status-pill" id="statusPill">No image loaded</span>
</header>

<div class="main-layout">
  <div class="canvas-area">
    <div class="canvas-toolbar">
      <span>Preview</span>
      <div class="view-toggle">
        <button class="active" data-view="original">Original</button>
        <button data-view="binary">Binary</button>
        <button data-view="traced">Traced</button>
        <button data-view="overlay">Overlay</button>
      </div>
    </div>
    <div class="canvas-container" id="canvasContainer">
      <canvas id="mainCanvas"></canvas>
      <canvas id="traceCanvas"></canvas>

      <div class="drop-zone" id="dropZone">
        <svg viewBox="0 0 64 64"><rect x="8" y="8" width="48" height="48" rx="4"/><circle cx="24" cy="26" r="6"/><polyline points="8,44 22,32 34,40 44,28 56,38"/></svg>
        <p>Drop an image here or <span id="browseLink">browse</span></p>
        <p style="font-size:10px;color:var(--border);">PNG, JPG, BMP, WebP</p>
      </div>

      <div class="processing-overlay hidden" id="processingOverlay">
        <div class="spinner"></div>
        Tracing contours...
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-section">
      <h3>Image</h3>
      <div class="info-box" id="imageInfo">No image loaded. Drop or browse to begin.</div>
      <button class="btn" id="loadNewBtn" style="display:none;">Load New Image</button>
    </div>

    <div class="panel-section" id="controlsSection" style="display:none;">
      <h3>Threshold</h3>
      <div class="control-row">
        <label>Brightness</label>
        <input type="range" id="thresholdSlider" min="1" max="254" value="128">
        <span class="val" id="thresholdVal">128</span>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="invertCheck">
        <label for="invertCheck">Invert (trace white areas)</label>
      </div>
      <div class="control-row">
        <label>Channel</label>
        <select id="channelSelect">
          <option value="luminance">Luminance</option>
          <option value="red">Red</option>
          <option value="green">Green</option>
          <option value="blue">Blue</option>
          <option value="alpha">Alpha</option>
        </select>
      </div>
    </div>

    <div class="panel-section" id="simplifySection" style="display:none;">
      <h3>Path Simplification</h3>
      <div class="control-row">
        <label>Tolerance</label>
        <input type="range" id="toleranceSlider" min="0" max="50" value="10" step="1">
        <span class="val" id="toleranceVal">1.0</span>
      </div>
      <div class="control-row">
        <label>Min path pts</label>
        <input type="range" id="minPointsSlider" min="2" max="100" value="8">
        <span class="val" id="minPointsVal">8</span>
      </div>
      <div class="control-row">
        <label>Smoothing</label>
        <input type="range" id="smoothSlider" min="0" max="10" value="0" step="1">
        <span class="val" id="smoothVal">0</span>
      </div>
    </div>

    <div class="panel-section" id="exportSection" style="display:none;">
      <h3>Export</h3>
      <div class="control-row">
        <label>Scale</label>
        <select id="unitScale">
          <option value="1">1 px = 1 mm</option>
          <option value="0.1">1 px = 0.1 mm</option>
          <option value="0.5">1 px = 0.5 mm</option>
          <option value="2">1 px = 2 mm</option>
        </select>
      </div>
      <div class="control-row">
        <label>Stroke width</label>
        <select id="strokeWidthSelect">
          <option value="0.1">0.1 mm (hairline)</option>
          <option value="0.25" selected>0.25 mm</option>
          <option value="0.5">0.5 mm</option>
          <option value="1">1 mm</option>
        </select>
      </div>
    </div>

    <div class="panel-section" id="statsSection" style="display:none;">
      <h3>Statistics</h3>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-val" id="statPaths">0</div>
          <div class="stat-label">Paths</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statPoints">0</div>
          <div class="stat-label">Points</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statWidth">0</div>
          <div class="stat-label">Width mm</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statHeight">0</div>
          <div class="stat-label">Height mm</div>
        </div>
      </div>
    </div>

    <div class="panel-footer">
      <button class="btn btn-primary" id="exportSvgBtn" disabled>⬇ Export .SVG (Onshape / Inkscape)</button>
      <button class="btn" id="copySvgBtn" disabled>Copy SVG to Clipboard</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none;">

<script>
// ============================================================
// IMAGE TO SVG VECTORIZER
// Marching Squares contour tracing + Douglas-Peucker simplification
// ============================================================

const $ = id => document.getElementById(id);

// State
const state = {
  imageData: null,       // original ImageData
  width: 0,
  height: 0,
  binary: null,          // Uint8Array, 0 or 1
  contours: [],          // array of [{x,y}, ...]
  simplified: [],        // after Douglas-Peucker
  currentView: 'original',
  imageLoaded: false
};

// Elements
const mainCanvas = $('mainCanvas');
const traceCanvas = $('traceCanvas');
const mainCtx = mainCanvas.getContext('2d');
const traceCtx = traceCanvas.getContext('2d');
const dropZone = $('dropZone');
const fileInput = $('fileInput');
const container = $('canvasContainer');

// ======================== FILE LOADING ========================

$('browseLink').addEventListener('click', () => fileInput.click());
$('loadNewBtn').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      // Limit to reasonable size for tracing performance
      let w = img.width, h = img.height;
      const MAX = 1200;
      if (w > MAX || h > MAX) {
        const s = MAX / Math.max(w, h);
        w = Math.round(w * s);
        h = Math.round(h * s);
      }

      state.width = w;
      state.height = h;

      mainCanvas.width = w;
      mainCanvas.height = h;
      traceCanvas.width = w;
      traceCanvas.height = h;

      mainCtx.drawImage(img, 0, 0, w, h);
      state.imageData = mainCtx.getImageData(0, 0, w, h);
      state.imageLoaded = true;

      dropZone.classList.add('hidden');
      $('imageInfo').textContent = `${img.width}×${img.height} → ${w}×${h}px`;
      $('loadNewBtn').style.display = '';
      $('controlsSection').style.display = '';
      $('simplifySection').style.display = '';
      $('exportSection').style.display = '';
      $('statsSection').style.display = '';
      $('statusPill').textContent = 'Image loaded';
      $('statusPill').classList.add('active');
      $('exportSvgBtn').disabled = false;
      $('copySvgBtn').disabled = false;

      processImage();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ======================== IMAGE PROCESSING ========================

function processImage() {
  if (!state.imageLoaded) return;

  const t0 = performance.now();
  $('processingOverlay').classList.remove('hidden');

  // Use requestAnimationFrame to let the overlay render
  requestAnimationFrame(() => {
    setTimeout(() => {
      computeBinary();
      traceContours();
      simplifyContours();
      updateStats();
      render();
      $('processingOverlay').classList.add('hidden');
      const dt = performance.now() - t0;
      $('statusPill').textContent = `Traced in ${dt.toFixed(0)}ms`;
    }, 20);
  });
}

function computeBinary() {
  const data = state.imageData.data;
  const w = state.width, h = state.height;
  const threshold = parseInt($('thresholdSlider').value);
  const invert = $('invertCheck').checked;
  const channel = $('channelSelect').value;

  state.binary = new Uint8Array(w * h);

  for (let i = 0; i < w * h; i++) {
    const idx = i * 4;
    let v;
    if (channel === 'red') v = data[idx];
    else if (channel === 'green') v = data[idx + 1];
    else if (channel === 'blue') v = data[idx + 2];
    else if (channel === 'alpha') v = data[idx + 3];
    else v = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2]; // luminance

    let bit = v >= threshold ? 0 : 1; // dark = 1 (foreground)
    if (invert) bit = 1 - bit;
    state.binary[i] = bit;
  }
}

// ======================== MARCHING SQUARES ========================

function traceContours() {
  const w = state.width, h = state.height;
  const bin = state.binary;
  const visited = new Uint8Array((w + 1) * (h + 1)); // edge visited flags
  state.contours = [];

  // Padded grid access: 0 outside bounds
  function getPixel(x, y) {
    if (x < 0 || x >= w || y < 0 || y >= h) return 0;
    return bin[y * w + x];
  }

  // Marching squares cell value at grid vertex (x, y)
  // The cell is the 2x2 block with corners at pixels (x-1,y-1), (x,y-1), (x-1,y), (x,y)
  function cellValue(gx, gy) {
    const tl = getPixel(gx - 1, gy - 1);
    const tr = getPixel(gx, gy - 1);
    const bl = getPixel(gx - 1, gy);
    const br = getPixel(gx, gy);
    return (tl << 3) | (tr << 2) | (br << 1) | bl;
  }

  // Direction tables for marching squares
  // Each case maps to next direction: 0=right, 1=down, 2=left, 3=up
  // Using clockwise traversal (outer contours go clockwise)
  const nextDir = {
    1: 3, 2: 0, 3: 0, 4: 1, 6: 1, 7: 0, 8: 2, 9: 3,
    11: 3, 12: 2, 13: 2, 14: 1
  };

  // Saddle cases 5 and 10 depend on previous direction
  const dx = [1, 0, -1, 0];
  const dy = [0, 1, 0, -1];

  // Scan for contour start points
  for (let gy = 0; gy <= h; gy++) {
    for (let gx = 0; gx <= w; gx++) {
      const cv = cellValue(gx, gy);
      if (cv === 0 || cv === 15) continue; // fully inside or outside

      const edgeKey = gy * (w + 1) + gx;
      if (visited[edgeKey]) continue;

      // Trace contour
      const contour = [];
      let cx = gx, cy = gy;
      let prevDir = -1;
      let steps = 0;
      const maxSteps = (w + 1) * (h + 1) * 2;

      do {
        const key = cy * (w + 1) + cx;
        visited[key] = 1;
        contour.push({ x: cx, y: cy });

        const c = cellValue(cx, cy);
        let dir;

        if (c === 5) {
          // Saddle: use previous direction
          dir = (prevDir === 0 || prevDir === 2) ? prevDir : 0;
        } else if (c === 10) {
          dir = (prevDir === 1 || prevDir === 3) ? prevDir : 1;
        } else {
          dir = nextDir[c];
          if (dir === undefined) break;
        }

        cx += dx[dir];
        cy += dy[dir];
        prevDir = dir;
        steps++;
      } while ((cx !== gx || cy !== gy) && steps < maxSteps);

      if (contour.length >= 3) {
        state.contours.push(contour);
      }
    }
  }
}

// ======================== PATH SIMPLIFICATION ========================

function douglasPeucker(points, epsilon) {
  if (points.length <= 2) return points;

  let maxDist = 0, maxIdx = 0;
  const start = points[0];
  const end = points[points.length - 1];

  for (let i = 1; i < points.length - 1; i++) {
    const d = pointToLineDist(points[i], start, end);
    if (d > maxDist) { maxDist = d; maxIdx = i; }
  }

  if (maxDist > epsilon) {
    const left = douglasPeucker(points.slice(0, maxIdx + 1), epsilon);
    const right = douglasPeucker(points.slice(maxIdx), epsilon);
    return left.slice(0, -1).concat(right);
  }

  return [start, end];
}

function pointToLineDist(p, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.hypot(p.x - a.x, p.y - a.y);
  let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(p.x - (a.x + t * dx), p.y - (a.y + t * dy));
}

function smoothPath(points, iterations) {
  if (iterations <= 0 || points.length < 3) return points;
  let pts = points.slice();
  for (let iter = 0; iter < iterations; iter++) {
    const smoothed = [pts[0]];
    for (let i = 1; i < pts.length - 1; i++) {
      smoothed.push({
        x: 0.25 * pts[i-1].x + 0.5 * pts[i].x + 0.25 * pts[i+1].x,
        y: 0.25 * pts[i-1].y + 0.5 * pts[i].y + 0.25 * pts[i+1].y
      });
    }
    smoothed.push(pts[pts.length - 1]);
    pts = smoothed;
  }
  return pts;
}

function simplifyContours() {
  const tolerance = parseInt($('toleranceSlider').value) / 10;
  const minPoints = parseInt($('minPointsSlider').value);
  const smoothIter = parseInt($('smoothSlider').value);

  state.simplified = [];
  for (const contour of state.contours) {
    let pts = douglasPeucker(contour, tolerance);
    if (pts.length < minPoints) continue;
    pts = smoothPath(pts, smoothIter);
    state.simplified.push(pts);
  }
}

function updateStats() {
  const scale = parseFloat($('unitScale').value);
  const totalPoints = state.simplified.reduce((sum, c) => sum + c.length, 0);
  $('statPaths').textContent = state.simplified.length;
  $('statPoints').textContent = totalPoints;
  $('statWidth').textContent = (state.width * scale).toFixed(1);
  $('statHeight').textContent = (state.height * scale).toFixed(1);
}

// ======================== RENDERING ========================

function render() {
  const w = state.width, h = state.height;
  mainCtx.clearRect(0, 0, w, h);
  traceCtx.clearRect(0, 0, w, h);

  const view = state.currentView;

  if (view === 'original' || view === 'overlay') {
    // Draw original image
    if (state.imageData) {
      mainCtx.putImageData(state.imageData, 0, 0);
    }
  }

  if (view === 'binary') {
    // Draw binary image
    if (state.binary) {
      const imgData = mainCtx.createImageData(w, h);
      for (let i = 0; i < w * h; i++) {
        const v = state.binary[i] ? 0 : 255;
        imgData.data[i * 4] = v;
        imgData.data[i * 4 + 1] = v;
        imgData.data[i * 4 + 2] = v;
        imgData.data[i * 4 + 3] = 255;
      }
      mainCtx.putImageData(imgData, 0, 0);
    }
  }

  if (view === 'traced' || view === 'overlay') {
    const ctx = (view === 'overlay') ? traceCtx : mainCtx;
    if (view === 'traced') {
      // Dark background
      mainCtx.fillStyle = '#121215';
      mainCtx.fillRect(0, 0, w, h);
    }

    ctx.strokeStyle = '#f05e23';
    ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    for (const contour of state.simplified) {
      if (contour.length < 2) continue;
      ctx.beginPath();
      ctx.moveTo(contour[0].x, contour[0].y);
      for (let i = 1; i < contour.length; i++) {
        ctx.lineTo(contour[i].x, contour[i].y);
      }
      ctx.closePath();
      ctx.stroke();
    }
  }

  // Hide trace canvas when not in overlay mode
  traceCanvas.style.display = (view === 'overlay') ? '' : 'none';
}

// ======================== VIEW TOGGLE ========================

document.querySelectorAll('.view-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.currentView = btn.dataset.view;
    render();
  });
});

// ======================== CONTROL HANDLERS ========================

function bindSlider(sliderId, valId, formatter, onChange) {
  const slider = $(sliderId);
  const valEl = $(valId);
  slider.addEventListener('input', () => {
    valEl.textContent = formatter ? formatter(slider.value) : slider.value;
    onChange();
  });
}

bindSlider('thresholdSlider', 'thresholdVal', null, processImage);
bindSlider('toleranceSlider', 'toleranceVal', v => (v / 10).toFixed(1), () => { simplifyContours(); updateStats(); render(); });
bindSlider('minPointsSlider', 'minPointsVal', null, () => { simplifyContours(); updateStats(); render(); });
bindSlider('smoothSlider', 'smoothVal', null, () => { simplifyContours(); updateStats(); render(); });

$('invertCheck').addEventListener('change', processImage);
$('channelSelect').addEventListener('change', processImage);
$('unitScale').addEventListener('change', updateStats);

// ======================== SVG EXPORT ========================

function generateSVG() {
  const scale = parseFloat($('unitScale').value);
  const sw = parseFloat($('strokeWidthSelect').value);
  const w = state.width, h = state.height;
  const realW = (w * scale).toFixed(4);
  const realH = (h * scale).toFixed(4);

  const paths = [];
  for (const contour of state.simplified) {
    if (contour.length < 2) continue;
    let d = `M ${(contour[0].x * scale).toFixed(3)} ${(contour[0].y * scale).toFixed(3)}`;
    for (let i = 1; i < contour.length; i++) {
      d += ` L ${(contour[i].x * scale).toFixed(3)} ${(contour[i].y * scale).toFixed(3)}`;
    }
    d += ' Z';
    paths.push(`  <path d="${d}"/>`);
  }

  return `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="${realW}mm" height="${realH}mm"
     viewBox="0 0 ${realW} ${realH}">
<g fill="none" stroke="#000000" stroke-width="${sw}">
${paths.join('\n')}
</g>
</svg>`;
}

$('exportSvgBtn').addEventListener('click', () => {
  if (state.simplified.length === 0) return;
  const svg = generateSVG();
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'traced_image.svg';
  a.click();
  URL.revokeObjectURL(url);
});

$('copySvgBtn').addEventListener('click', () => {
  if (state.simplified.length === 0) return;
  const svg = generateSVG();
  navigator.clipboard.writeText(svg).then(() => {
    $('copySvgBtn').textContent = '✓ Copied!';
    setTimeout(() => { $('copySvgBtn').textContent = 'Copy SVG to Clipboard'; }, 1500);
  });
});

// ======================== CANVAS RESIZE ========================

function resizeCanvases() {
  // CSS handles max-width/max-height, just ensure trace canvas matches
  const rect = mainCanvas.getBoundingClientRect();
  traceCanvas.style.width = rect.width + 'px';
  traceCanvas.style.height = rect.height + 'px';
  traceCanvas.style.left = mainCanvas.offsetLeft + 'px';
  traceCanvas.style.top = mainCanvas.offsetTop + 'px';
}

new ResizeObserver(resizeCanvases).observe(container);

</script>
